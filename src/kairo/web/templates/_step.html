<div hx-ext="sse" sse-connect="/w/{{ slug }}/step/{{ task_id }}/stream">
  <div id="step-log" sse-swap="message" hx-swap="beforeend"></div>
  <div class="step-status"
       sse-swap="done"
       hx-get="/w/{{ slug }}"
       hx-trigger="sse:done"
       hx-target="body"
       hx-select=".layout"
       hx-swap="outerHTML">{{ t('step.running') }}</div>
  <button class="btn btn-ghost" hx-post="/w/{{ slug }}/step/{{ task_id }}/cancel" hx-target="#step-area">{{ t('step.cancel') }}</button>
</div>
