<div class="meta">
  <p class="meta-kicker">产物 · <span class="meta-st {{ status }}">{{ status }}</span></p>
  <h3 class="meta-title">{{ path }}</h3>
  {% if reason %}<p class="meta-hint">原因:{{ reason }}</p>{% endif %}
  <div class="meta-label">形态</div>
  <ul class="form-list">
    {% if has_doc %}
    <li class="form-item is-prev on" hx-get="/w/{{ slug | urlencode }}/doc?path={{ path | urlencode }}" hx-target="#reader">
      <div class="form-top">
        <span class="form-role">document</span>
        <span class="form-prev">预览 →</span>
      </div>
      <div class="form-loc">{{ path }}</div>
    </li>
    {% else %}
    <li class="form-item form-empty">尚未生成</li>
    {% endif %}
  </ul>
</div>
{% include "_reader_oob.html" %}
