<div class="ref">
  <h4>{{ title }}</h4>
  <div class="ref-meta">{{ cls }} · {{ ref_id }}</div>
  <table>
    <tr><th>role</th><th>origin</th><th></th></tr>
    {% for f in forms %}
    <tr>
      <td class="role">{{ f.role }}</td>
      <td class="origin">{{ f.origin }}</td>
      <td>{% if f.is_md %}<a href="#" hx-get="/w/{{ slug }}/doc?path={{ f.location | urlencode }}" hx-target="#reader">预览</a>{% endif %}</td>
    </tr>
    {% endfor %}
  </table>
</div>
