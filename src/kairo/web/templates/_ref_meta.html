<div class="meta">
  <p class="meta-kicker">参考 · {{ cls }}{% if label %} · {{ label }}{% endif %}</p>
  <h3 class="meta-title">{{ title }}</h3>
  {% if hint %}<p class="meta-hint">{{ hint }}</p>{% endif %}
  <div class="meta-label">形态</div>
  <ul class="form-list">
    {% for f in forms %}
    <li class="form-item{% if f.previewable %} is-prev{% endif %}{% if f.location == preview_title %} on{% endif %}"
        {% if f.previewable %}hx-get="/w/{{ slug | urlencode }}/doc?path={{ f.location | urlencode }}" hx-target="#reader"{% endif %}>
      <div class="form-top">
        <span class="form-role">{{ f.role }}</span>
        {% if f.previewable %}<span class="form-prev">预览 →</span>{% endif %}
      </div>
      <div class="form-origin">{{ f.origin }}</div>
      <div class="form-loc">{{ f.location }}</div>
    </li>
    {% endfor %}
  </ul>
</div>
{% include "_reader_oob.html" %}
