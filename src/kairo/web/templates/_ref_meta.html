<div class="meta">
  <p class="meta-kicker">参考 · {{ cls }}{% if label %} · {{ label }}{% endif %}</p>
  <h3 class="meta-title">{{ title }}</h3>
  {% if hint %}<p class="meta-hint">{{ hint }}</p>{% endif %}
  <div class="meta-label">形态</div>
  <table class="meta-forms">
    <thead><tr><th>role</th><th>origin</th><th>location</th><th></th></tr></thead>
    <tbody>
    {% for f in forms %}
    <tr class="{% if f.previewable %}is-prev{% endif %}{% if f.location == preview_title %} on{% endif %}"
        {% if f.previewable %}hx-get="/w/{{ slug | urlencode }}/doc?path={{ f.location | urlencode }}" hx-target="#reader"{% endif %}>
      <td class="mf-role">{{ f.role }}</td>
      <td class="mf-origin">{{ f.origin }}</td>
      <td class="mf-loc">{{ f.location }}</td>
      <td class="mf-act">{% if f.previewable %}预览 →{% endif %}</td>
    </tr>
    {% endfor %}
    </tbody>
  </table>
</div>
{% include "_reader_oob.html" %}
