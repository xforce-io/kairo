<div class="meta">
  <p class="meta-kicker">{{ t('ref.kicker') }}{% if label %} · {{ label }}{% endif %}</p>
  <h3 class="meta-title">{{ title }}</h3>
  {% if hint %}<p class="meta-hint">{{ hint }}</p>{% endif %}
  <div class="meta-label">{{ t('forms.label') }}</div>
  <table class="meta-forms">
    <tbody>
    {% for f in forms %}
    <tr class="{% if f.previewable %}is-prev {% endif %}{% if f.key == preview_key %}on{% endif %}"
        {% if f.previewable %}hx-get="/w/{{ slug | urlencode }}/ref/{{ ref_id }}/form/{{ f.key }}" hx-target="#reader"{% endif %}>
      <td class="mf-role" title="{{ f.role }}">{{ f.role_label }}</td>
      <td class="mf-actions">
        <button type="button" class="copy-btn" data-copy="{{ f.location }}" title="{{ f.location }}" aria-label="{{ t('forms.copy_path') }}">
          <svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
        </button>
        {% if f.previewable %}<span class="mf-prev">{{ t('forms.preview') }}</span>{% endif %}
      </td>
    </tr>
    {% endfor %}
    </tbody>
  </table>
</div>
{% include "_reader_oob.html" %}
